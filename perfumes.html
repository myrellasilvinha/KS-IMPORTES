<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <title>Elite Brasiguaio</title>
</head>

<body>
    <header>
        <div class="menu">
            <img src="img/elitebrasiguaio.png" alt="EliteBrasiguaio">
            <button class="hamburger" id="hamburger" aria-label="Abrir menu">
                <i class="bi bi-list"></i>
            </button>
            <ul id="nav_list">
                <li class="nav-item">
                    <a href="index.html">
                        <p class="hover-underline-animation center">Inicio</p>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="produtos.html">
                        <p class="hover-underline-animation center">Produtos</p>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="perfumes.html">
                        <p class="hover-underline-animation center">Perfumes</p>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="contato.html">
                        <p class="hover-underline-animation center">Contato</p>
                    </a>
                </li>
            </ul>
            <div class="icon">
                <div class="user">
                    <i class="bi bi-person"></i>
                </div>
                <div class="carrinho">
                    <i class="bi bi-cart3"></i>
                </div>
            </div>
        </div>
    </header>

    <main class="produtos-layout">
        <button class="botao-filtros-mobile" id="botaoFiltrosMobile">
            <i class="bi bi-sliders"></i>
            Filtros
        </button>

        <aside class="filtros" id="filtros">
            <h2>Filtrar</h2>

            <div class="filtro-grupo">
                <label for="busca">Pesquisar</label>
                <div class="campo-busca">
                    <i class="bi bi-search"></i>
                    <input type="text" id="busca" placeholder="Buscar produto...">
                </div>
            </div>

            <div class="filtro-grupo">
                <label for="ordenar">Ordenar</label>
                <select id="ordenar">
                    <option value="relevancia">Relevância</option>
                    <option value="preco-asc">Preço: menor ao maior</option>
                    <option value="preco-desc">Preço: maior ao menor</option>
                    <option value="az">A - Z</option>
                    <option value="za">Z - A</option>
                    <option value="novo">Mais novo ao mais antigo</option>
                    <option value="antigo">Mais antigo ao mais novo</option>
                    <option value="vendidos">Mais vendidos</option>
                </select>
            </div>

            <div class="filtro-grupo">
                <label>Preço</label>
                <div class="campo-preco">
                    <input type="text" id="precoDe" inputmode="decimal" placeholder="De">
                    <span>—</span>
                    <input type="text" id="precoAte" inputmode="decimal" placeholder="Até">
                </div>
            </div>

            <button id="aplicarFiltros" class="botao-aplicar">
                Aplicar
            </button>
        </aside>

        <div class="conteudo-produtos">
            <section class="cards" id="cards">
            </section>
        </div>
    </main>

    <footer>
        <p>© 2026 Elite Brasiguaio. Todos os direitos reservados.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/perfumes.js"></script>
    <script src="js/menu.js"></script>
    <script src="js/topo.js"></script>
</body>

</html>
