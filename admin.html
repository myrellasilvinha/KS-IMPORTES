<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - KS IMPORTES</title>
    <link rel="stylesheet" href="css/admin.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">
    <title>Elite Brasiguaio</title>
</head>

<body>
    <header>
        <div class="menu">
            <img src="img/elitebrasiguaio.png" alt="EliteBrasiguaio">
            <p>Painel Administrativo</p>
    </header>
    <main>
        <section class="formulario">
            <h2>Novo Produto</h2>
            <input type="hidden" id="idProduto">
            <label>Nome do Produto</label>
            <input type="text" id="nome">

            <label>Grupo do Produto</label>
            <input type="text" id="grupo" list="listaGrupos" placeholder="Ex: Tirzepatida, Retatrutide, Peptídeos...">
            <datalist id="listaGrupos"></datalist>

            <label>Descrição do Produto</label>
            <textarea id="descricao" rows="4" placeholder="Descreva o produto..."></textarea>

            <div class="toggle-linha">
                <label class="toggle-label" for="promocaoAtiva">Produto em promoção?</label>
                <label class="switch">
                    <input type="checkbox" id="promocaoAtiva">
                    <span class="slider"></span>
                </label>
            </div>

            <label id="labelPreco">Preço</label>
            <input type="text" id="preco" inputmode="decimal" placeholder="Ex: 790,00">

            <div id="wrapperPrecoAntigo" class="escondido">
                <label>Preço Antigo (de/por)</label>
                <input type="text" id="precoAntigo" inputmode="decimal" placeholder="Ex: 1.400,00">
            </div>

            <label>Imagem</label>
            <input type="file" id="imagem" accept="image/*">
            <button id="salvar">
                <i class="bi bi-floppy"></i>
                Salvar Produto
            </button>
        </section>
        <section class="lista">
            <h2>Produtos Cadastrados</h2>
            <table>
                <thead>
                    <tr>
                        <th>Imagem</th>
                        <th>Produto</th>
                        <th>Grupo</th>
                        <th>Preço</th>
                        <th>Promoção</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="listaProdutos">
                </tbody>
            </table>
        </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/topo.js"></script>
</body>

</html>
